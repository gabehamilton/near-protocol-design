\* Divergent-verifier configuration, accountability property only.
\* Expected: TLC reports an AccountableEquivocation VIOLATION -- the
\* unaccountable light-client split: a Byzantine validator feeds approval
\* (mA, s1), valid only under implA, to light client lc1, and (mB, s2),
\* valid only under implB, to lc2.  The clients' finality views conflict,
\* yet the adjudicator (implA) deems only one of the two signatures valid,
\* so no slashable evidence exists.  This is the attack class described in
\* docs/verification-consistency.md section 1.1.
SPECIFICATION Spec
CONSTANTS
  v1  = v1
  mA  = mA
  mB  = mB
  s1  = s1
  s2  = s2
  lc1 = lc1
  lc2 = lc2
  adj = adj
  Validators    = {v1}
  ByzValidators = {v1}
  JudgesA       = {lc1, adj}
  JudgesB       = {lc2}
  LightClients  = {lc1, lc2}
  Adjudicator   = adj
  Msgs          = {mA, mB}
  Sigs          = {s1, s2}
  Conformant    = FALSE
INVARIANTS
  AccountableEquivocation
